{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}ReleCloud - Iniciar sesión{% endblock %}

{% block content %}
<h2 class="tk-elevon mb-4">Iniciar sesión</h2>

<form method="post" class="mt-3">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary mt-2">Entrar</button>
</form>

<p class="mt-3">
    ¿No tienes cuenta?
    <a href="{% url 'account_signup' %}">Regístrate aquí</a>
</p>
{% endblock %}
