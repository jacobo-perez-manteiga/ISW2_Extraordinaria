{% extends 'base.html' %}

{% block title %}ReleCloud - Cerrar sesión{% endblock %}

{% block content %}
<h2 class="tk-elevon mb-4">Cerrar sesión</h2>

<p>¿Estás seguro de que quieres cerrar sesión?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Cerrar sesión</button>
    <a href="{% url 'index' %}" class="btn btn-secondary ml-2">Cancelar</a>
</form>
{% endblock %}
