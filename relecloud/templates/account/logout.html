{% extends 'base.html' %}

{% block title %}ReleCloud - Cerrar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <h2 class="tk-elevon mb-4">Cerrar sesión</h2>

                <p class="mb-4">¿Estás seguro de que quieres cerrar sesión?</p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger mr-2">Cerrar sesión</button>
                    <a href="{% url 'index' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
