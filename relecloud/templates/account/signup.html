{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}ReleCloud - Registrarse{% endblock %}

{% block content %}
<h2 class="tk-elevon mb-4">Crear cuenta</h2>

<form method="post" class="mt-3">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary mt-2">Crear cuenta</button>
</form>

<p class="mt-3">
    ¿Ya tienes cuenta?
    <a href="{% url 'account_login' %}">Inicia sesión aquí</a>
</p>
{% endblock %}
