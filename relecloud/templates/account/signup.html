{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}ReleCloud - Registrarse{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="tk-elevon mb-4 text-center">Crear cuenta</h2>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary btn-block mt-2">Crear cuenta</button>
                </form>

                <p class="mt-3 text-center">
                    ¿Ya tienes cuenta?
                    <a href="{% url 'account_login' %}">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
